apiVersion: kubewise.io/v1alpha1
kind: Composite
metadata:
  name: composite-savings
  description: "Right-size then move stateless workloads to spot for maximum savings"
spec:
  steps:
    - kind: RightSize
      spec:
        percentile: p95
        buffer: 20
        scope:
          namespaces: ["*"]
          exclude:
            - namespace: kube-system
        limits:
          strategy: ratio
    - kind: SpotMigrate
      spec:
        eligibility:
          min_replicas: 2
          controller_types:
            - Deployment
            - ReplicaSet
          exclude_namespaces:
            - kube-system
            - payments
        spot_discount: 0.65
