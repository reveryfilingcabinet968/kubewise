apiVersion: kubewise.io/v1alpha1
kind: SpotMigrate
metadata:
  name: spot-stateless
  description: "Migrate stateless workloads with 2+ replicas to spot instances (65% discount)"
spec:
  eligibility:
    min_replicas: 2
    controller_types:
      - Deployment
      - ReplicaSet
    exclude_namespaces:
      - kube-system
      - payments
  spot_discount: 0.65
