<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 120" fill="none">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#326CE5;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1A3F8B;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00D4AA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#00A676;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Hexagonal K8s-inspired icon -->
  <g transform="translate(60, 60)">
    <!-- Outer hexagon -->
    <polygon points="0,-42 36.4,-21 36.4,21 0,42 -36.4,21 -36.4,-21" fill="url(#grad1)" />
    <!-- Inner hexagon -->
    <polygon points="0,-30 26,-15 26,15 0,30 -26,15 -26,-15" fill="#fff" fill-opacity="0.15" />

    <!-- Stylized "what-if" branching arrows -->
    <!-- Main stem -->
    <line x1="0" y1="16" x2="0" y2="-8" stroke="#fff" stroke-width="3.5" stroke-linecap="round"/>
    <!-- Branch left -->
    <line x1="0" y1="-8" x2="-14" y2="-22" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <!-- Branch right -->
    <line x1="0" y1="-8" x2="14" y2="-22" stroke="#fff" stroke-width="3" stroke-linecap="round"/>
    <!-- Left dot (scenario A) -->
    <circle cx="-14" cy="-22" r="4.5" fill="#00D4AA"/>
    <!-- Right dot (scenario B) -->
    <circle cx="14" cy="-22" r="4.5" fill="#F5A623"/>
    <!-- Base dot -->
    <circle cx="0" cy="16" r="4.5" fill="#fff"/>
    <!-- Dashed circle (simulation) -->
    <circle cx="0" cy="-2" r="18" stroke="#fff" stroke-width="1.5" stroke-dasharray="4,3" fill="none" opacity="0.5"/>
  </g>

  <!-- Wordmark -->
  <g transform="translate(115, 48)">
    <text font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="44" font-weight="700" fill="#1E293B">
      <tspan>Kube</tspan><tspan fill="url(#grad2)">Wise</tspan>
    </text>
  </g>

  <!-- Tagline -->
  <text x="117" y="82" font-family="system-ui, -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif" font-size="14" font-weight="400" fill="#64748B" letter-spacing="0.5">
    Kubernetes what-if cost simulator
  </text>
</svg>
